url: https://pjt222.github.io/putior/
template:
  bootstrap: 5
  bootswatch: cosmo
  light-switch: true
  bslib:
    primary: "#2563eb"
    base_font: {google: "Fira Sans"}
    heading_font: {google: "Fira Sans"}
    code_font: {google: "Fira Code"}
  includes:
    in_header: |
      <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.3/dist/mermaid.min.js"></script>
      <script>
        // Theme-aware Mermaid configuration
        // Light colors aligned with putior default theme
        // Dark colors aligned with agent-almanac/viz cyberpunk palette
        var mermaidThemes = {
          light: {
            theme: 'default',
            themeVariables: {
              primaryColor: '#f0f4ff',
              primaryTextColor: '#1e293b',
              primaryBorderColor: '#2563eb',
              lineColor: '#64748b',
              secondaryColor: '#f8fafc',
              tertiaryColor: '#f1f5f9'
            }
          },
          dark: {
            theme: 'dark',
            themeVariables: {
              primaryColor: '#1a1a2e',
              primaryTextColor: '#e0e0e8',
              primaryBorderColor: '#00f0ff',
              lineColor: '#888899',
              secondaryColor: '#16213e',
              tertiaryColor: '#0f3460'
            }
          }
        };

        function isDarkMode() {
          return document.documentElement.getAttribute('data-bs-theme') === 'dark';
        }

        function getMermaidConfig() {
          var colors = isDarkMode() ? mermaidThemes.dark : mermaidThemes.light;
          return {
            startOnLoad: false,
            theme: colors.theme,
            themeVariables: colors.themeVariables,
            flowchart: { htmlLabels: true, curve: 'linear' }
          };
        }

        // Store original diagram source for re-rendering on theme switch
        var mermaidSources = [];

        function renderMermaidDiagrams() {
          var config = getMermaidConfig();
          mermaid.initialize(config);

          // Find all pre blocks containing mermaid syntax
          var preBlocks = document.querySelectorAll('pre');
          preBlocks.forEach(function(pre) {
            var text = pre.textContent || pre.innerText;
            if ((text.includes('flowchart') || text.includes('graph') || text.includes('sequenceDiagram')) && pre.style.display !== 'none') {
              try {
                var container = document.createElement('div');
                container.className = 'mermaid-container';
                container.setAttribute('role', 'img');
                container.setAttribute('aria-label', 'Workflow diagram');
                var mermaidDiv = document.createElement('div');
                mermaidDiv.className = 'mermaid';
                mermaidDiv.textContent = text.trim();
                container.appendChild(mermaidDiv);
                pre.parentElement.insertBefore(container, pre);
                pre.style.display = 'none';
                mermaidSources.push({ container: container, source: text.trim() });
              } catch (e) { console.error('Error processing pre block', e); }
            }
          });

          // Also check code blocks
          var codeBlocks = document.querySelectorAll('pre > code');
          codeBlocks.forEach(function(code) {
            var text = code.textContent || code.innerText;
            if (code.parentElement.style.display === 'none') return;
            if (text.trim().startsWith('flowchart') || text.trim().startsWith('graph')) {
              try {
                var pre = code.parentElement;
                var container = document.createElement('div');
                container.className = 'mermaid-container';
                container.setAttribute('role', 'img');
                container.setAttribute('aria-label', 'Workflow diagram');
                var mermaidDiv = document.createElement('div');
                mermaidDiv.className = 'mermaid';
                mermaidDiv.textContent = text.trim();
                container.appendChild(mermaidDiv);
                pre.parentElement.insertBefore(container, pre);
                pre.style.display = 'none';
                mermaidSources.push({ container: container, source: text.trim() });
              } catch (e) { console.error('Error processing code block', e); }
            }
          });

          // Render all mermaid divs
          var allMermaidDivs = document.querySelectorAll('div.mermaid');
          if (allMermaidDivs.length > 0) {
            mermaid.init(config, allMermaidDivs);
          }
        }

        // Re-render diagrams when theme changes
        function rerenderMermaidDiagrams() {
          var config = getMermaidConfig();
          mermaid.initialize(config);
          mermaidSources.forEach(function(entry, idx) {
            var container = entry.container;
            container.innerHTML = '';
            var mermaidDiv = document.createElement('div');
            mermaidDiv.className = 'mermaid';
            mermaidDiv.id = 'mermaid-rerender-' + idx;
            mermaidDiv.textContent = entry.source;
            container.appendChild(mermaidDiv);
          });
          var divs = document.querySelectorAll('div.mermaid');
          if (divs.length > 0) { mermaid.init(config, divs); }
        }

        // Wait for DOM to be ready
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', renderMermaidDiagrams);
        } else {
          setTimeout(renderMermaidDiagrams, 100);
        }
        setTimeout(renderMermaidDiagrams, 1000);

        // Listen for Bootstrap light-switch theme changes
        var observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(m) {
            if (m.attributeName === 'data-bs-theme') {
              setTimeout(rerenderMermaidDiagrams, 50);
            }
          });
        });
        observer.observe(document.documentElement, { attributes: true });
      </script>
    after_body: |
      <style>
        /* Import external CSS */
        @import url('extra.css');

        /* Fira font family overrides */
        :root {
          --font-family-sans-serif: 'Fira Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          --font-family-monospace: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', Consolas, monospace;
        }

        body, .navbar, .btn {
          font-family: var(--font-family-sans-serif) !important;
        }

        pre, code, kbd, samp, .sourceCode {
          font-family: var(--font-family-monospace) !important;
        }

        .mermaid {
          font-family: var(--font-family-sans-serif) !important;
        }

        div.mermaid-container {
          text-align: center;
          margin: 1em 0;
        }
      </style>

